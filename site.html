<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Mening Saytim</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #4facfe, #00f2fe);
            color: #333;
        }

        header {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            text-align: center;
            margin: 15px 0;
        }

        nav a {
            text-decoration: none;
            margin: 0 15px;
            color: white;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }

        .hero h1 {
            font-size: 48px;
        }

        .hero p {
            font-size: 20px;
        }

        .btn {
            background: white;
            color: #4facfe;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h2>Mening Saytim</h2>
    <nav>
        <a href="#">Bosh sahifa</a>
        <a href="#">Haqida</a>
        <a href="#">Aloqa</a>
    </nav>
</header>

<footer>
    © 2026 Mening Saytim

</html>
