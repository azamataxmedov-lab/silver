<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            background: #020617;
        }

        header h2 {
            color: #38bdf8;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 50px;
        }

        .hero span {
            color: #38bdf8;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: #334155;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #38bdf8;
            color: black;
            border-radius: 20px;
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
        }
    </style>
</head>
<body>

<header>
    <h2>MySite</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Men <span>Web Developer</span></h1>
    <p>Chiroyli va tez saytlar yarataman</p>
</section>

<section class="cards">
    <div class="card">
        <h3>Portfolio</h3>
        <p>Mening ishlarimni ko‘ring</p>
        <a href="#" class="btn">Ko‘rish</a>
    </div>

    <div class="card">
        <h3>Xizmatlar</h3>
        <p>Qanday xizmatlar beraman</p>
        <a href="#" class="btn">Batafsil</a>
    </div>

    <div class="card">
        <h3>Aloqa</h3>
        <p>Menga bog‘laning</p>
        <a href="#" class="btn">Yozish</a>
    </div>
</section>

<footer>
    © 2026 Portfolio
</footer>

</body>
</html>
