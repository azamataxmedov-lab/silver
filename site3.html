<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Site</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    overflow-x: hidden;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
}

nav h2 {
    color: #00f7ff;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* Hero */
.hero {
    text-align: center;
    margin-top: 100px;
    animation: fadeIn 2s ease;
}

.hero h1 {
    font-size: 55px;
}

.hero span {
    color: #00f7ff;
}

.hero p {
    font-size: 20px;
}

.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 25px;
    background: #00f7ff;
    color: black;
    border-radius: 25px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: white;
}

/* Features */
.features {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 80px 20px;
    flex-wrap: wrap;
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    width: 250px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.box:hover {
    transform: scale(1.05);
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

footer {
    text-align: center;
    padding: 20px;
}
</style>

</head>
<body>

<nav>
    <h2>FutureSite</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">
    <h1>Kelajak <span>Sayti</span></h1>
    <p>Zamonaviy va tezkor web sahifalar</p>
    <a href="#" class="btn">Boshlash</a>
</section>

<section class="features">
    <div class="box">
        <h3>Tezlik</h3>
        <p>Saytlar juda tez ishlaydi</p>
    </div>

    <div class="box">
        <h3>Dizayn</h3>
        <p>Minimal va chiroyli UI</p>
    </div>

    <div class="box">
        <h3>Moslashuv</h3>
        <p>Telefon va kompyuterga mos</p>
    </div>
</section>

<footer>
    © 2026 FutureSite
</footer>

</body>
</html>
